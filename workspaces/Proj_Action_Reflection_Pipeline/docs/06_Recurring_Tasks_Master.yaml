routines:
  # 🏢 会社関連・講師・研修
  - name: "帰社日"
    type: "recurrent"
    rule:
      freq: "monthly"
      byday: "3FR"
    time:
      start: "18:00"
      end: "20:00"
    category: "company_event"

  - name: "帰社日 懇親会"
    type: "recurrent"
    rule:
      freq: "monthly"
      byday: "3FR"
    time:
      start: "20:00"
      end: "22:00"
    category: "company_event"

  - name: "勤怠入力完了と勤務表の提出"
    type: "recurrent"
    rule:
      freq: "monthly"
      bymonthday: -1
    time:
      all_day: true
    category: "administrative"

  - name: "毎月の目標エビデンス・進捗提出"
    type: "recurrent"
    rule:
      freq: "monthly"
      byday: "last_weekend"
    time:
      start: "10:00"
      end: "12:00"
    category: "administrative"

  - name: "勉強会(サブ講師)"
    type: "recurrent"
    rule:
      freq: "monthly"
      byday: "3TU"
    time:
      start: "20:00"
      end: "22:00"
    category: "instructor_duty"

  # 🏌️ 週末アクティビティ & 趣味
  - name: "ゴルフスクール＆練習"
    type: "recurrent"
    rule:
      freq: "weekly"
      byday: "SU"
    time:
      start: "09:05"
      end: "12:00"
    category: "hobby"
    note: "時間完全固定のため、直接Googleカレンダーの繰り返し予定として設定し、Agentは空き枠計算の制約としてのみ扱う。"

  - name: "ギターの練習・演奏"
    type: "floating"
    rule:
      freq: "flexible"
    time:
      flexible: true
    category: "hobby"
    note: "Agentが空き時間を見つけてカレンダーに枠を提案する流動タスク。"

  # 💰 資産・生活インフラ関連
  - name: "企業型DC 資産配分変更タイミング"
    type: "recurrent"
    rule:
      freq: "yearly"
      bymonth: 6
    time:
      flexible: true
    category: "finance"

  - name: "低頻度ローテーション家事"
    type: "recurrent"
    rule:
      freq: "monthly_rotation"
      rotation_items:
        - "風呂掃除（カビ対策・徹底洗浄）"
        - "排水溝掃除（キッチン・風呂・洗面台）"
        - "トイレ徹底掃除＆フィルター換気扇"
    time:
      flexible: true
    category: "housework"
