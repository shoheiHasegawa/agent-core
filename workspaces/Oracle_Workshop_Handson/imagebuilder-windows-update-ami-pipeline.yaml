AWSTemplateFormatVersion: "2010-09-09"
Description: Image Builder Pipeline for Windows Update Applied AMI

Parameters:
  SubnetId:
    Type: String
    Default: subnet-c5445ab1
    Description: Subnet ID where Image Builder EC2 instance will run (VPC vpc-33fc1c56)

  SecurityGroupId:
    Type: String
    Default: sg-c4d324a1
    Description: Security Group ID for Image Builder instance (SSM / NAT必須)

Resources:

  LocalizationComponent:
    Type: AWS::ImageBuilder::Component
    Properties:
      Name: Japanese-Localization-Component
      Platform: Windows
      Version: 1.0.1
      Data: |
        name: JapaneseLocalization
        description: Set TimeZone, Keyboard, and Locale to Japanese
        schemaVersion: 1.0
        phases:
          - name: build
            steps:
              - name: SetTimeZone
                action: ExecutePowerShell
                inputs:
                  commands:
                    - 'Set-TimeZone -Id "Tokyo Standard Time"'
                    - 'Write-Output "TimeZone set to Tokyo Standard Time"'
              
              - name: CreateUnattendXml
                action: ExecutePowerShell
                inputs:
                  commands:
                    - |
                      $xml = @"
                      <?xml version="1.0" encoding="utf-8"?>
                      <unattend xmlns="urn:schemas-microsoft-com:unattend">
                          <settings pass="oobeSystem">
                              <component name="Microsoft-Windows-International-Core" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                                  <InputLocale>ja-JP</InputLocale>
                                  <SystemLocale>ja-JP</SystemLocale>
                                  <UILanguage>ja-JP</UILanguage>
                                  <UserLocale>ja-JP</UserLocale>
                              </component>
                              <component name="Microsoft-Windows-Geo-Specific" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                                  <GeoId>122</GeoId>
                              </component>
                          </settings>
                      </unattend>
                      "@
                      $path = "C:\Windows\Panther\unattend.xml"
                      if (!(Test-Path "C:\Windows\Panther")) { New-Item -Path "C:\Windows\Panther" -ItemType Directory -Force }
                      $xml | Out-File -FilePath $path -Encoding UTF8
                      Write-Output "Created unattend.xml at $path"

              - name: SetKeyboardRegistry
                action: ExecutePowerShell
                inputs:
                  commands:
                    - '$path = "HKLM:\SYSTEM\CurrentControlSet\Services\i8042prt\Parameters"'
                    - 'Set-ItemProperty -Path $path -Name "LayerDriver JPN" -Value "kbd106.dll"'
                    - 'Set-ItemProperty -Path $path -Name "OverrideKeyboardIdentifier" -Value "PCAT_106KEY"'
                    - 'Set-ItemProperty -Path $path -Name "OverrideKeyboardType" -Value 7'
                    - 'Set-ItemProperty -Path $path -Name "OverrideKeyboardSubtype" -Value 2'
                    - 'Write-Output "Keyboard Registry configured for Japanese 106/109 Key"'

              - name: InstallLanguagePack
                action: ExecutePowerShell
                inputs:
                  commands:
                    - 'Write-Output "Attempting to install Japanese Language Pack..."'
                    - '$Lang = "ja-JP"'
                    # Try Install-Language (Server 2022+ / Win11)
                    - 'if (Get-Command Install-Language -ErrorAction SilentlyContinue) {'
                    - '    Write-Output "Using Install-Language cmdlet"'
                    - '    Install-Language $Lang'
                    - '} else {'
                    # Fallback for older versions or if cmdlet is missing
                    - '    Write-Output "Using DISM to install language pack (Online)"'
                    # Note: Microsoft sometimes changes capability names. This is a best-effort approach for online images.
                    # On some stripped AMIs, this might fail without an explicit source.
                    - '    dism /online /add-capability /capabilityname:Language.Basic~~~ja-JP~0.0.1.0'
                    - '    dism /online /add-capability /capabilityname:Language.Handwriting~~~ja-JP~0.0.1.0'
                    - '    dism /online /add-capability /capabilityname:Language.OCR~~~ja-JP~0.0.1.0'
                    - '    dism /online /add-capability /capabilityname:Language.Speech~~~ja-JP~0.0.1.0'
                    - '    dism /online /add-capability /capabilityname:Language.TextToSpeech~~~ja-JP~0.0.1.0'
                    - '}'

              - name: SetUserLanguageList
                action: ExecutePowerShell
                inputs:
                  commands:
                    - 'Set-WinSystemLocale -SystemLocale ja-JP'
                    - 'Set-WinHomeLocation -GeoId 122'
                    - 'Set-WinUserLanguageList -LanguageList ja-JP -Force'
                    - 'Write-Output "System Locale and User Language List set to ja-JP"'

  ImageRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: HandsOn-Windows-Update-Recipe
      Version: 1.0.6
      ParentImage: ami-027071aa073813511
      Components:
        - ComponentArn: !Ref LocalizationComponent
        - ComponentArn: arn:aws:imagebuilder:ap-northeast-1:aws:component/update-windows/1.0.1/1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            DeleteOnTermination: true
            VolumeType: gp2

  InfrastructureConfig:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: HandsOn-Infrastructure
      InstanceTypes:
        - t3.small
      TerminateInstanceOnFailure: true
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      InstanceProfileName: !Ref EC2InstanceProfileForImageBuilder

  EC2InstanceRoleForImageBuilder:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GetComponentForImageBuilder
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - imagebuilder:GetComponent
                Resource: "*"

  EC2InstanceProfileForImageBuilder:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRoleForImageBuilder

  DistributionConfig:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: HandsOn-Distribution
      Distributions:
        - Region: ap-northeast-1
          AmiDistributionConfiguration:
            Name: OracleHandsOnBase-win-{{imagebuilder:buildDate}}
            AmiTags:
              Name: Update-at-{{imagebuilder:buildDate}}

  ImagePipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: HandsOn-Windows-Pipeline
      ImageRecipeArn: !Ref ImageRecipe
      InfrastructureConfigurationArn: !Ref InfrastructureConfig
      DistributionConfigurationArn: !Ref DistributionConfig
      Schedule:
        ScheduleExpression: cron(0 15 31 12,6 ? *) # 12/31と6/30の15:00 UTC = 1/1と7/1の00:00 JST
        PipelineExecutionStartCondition: EXPRESSION_MATCH_ONLY
      Status: ENABLED

Outputs:
  PipelineName:
    Description: Name of the Image Builder Pipeline
    Value: !Ref ImagePipeline
  RecipeName:
    Description: Name of the Recipe
    Value: !Ref ImageRecipe
