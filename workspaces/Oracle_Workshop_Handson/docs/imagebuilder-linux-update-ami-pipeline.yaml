AWSTemplateFormatVersion: "2010-09-09"
Description: Image Builder Pipeline for Linux Update Applied AMI

Parameters:
  SubnetId:
    Type: String
    Default: subnet-c5445ab1
    Description: Subnet ID where Image Builder EC2 instance will run (VPC vpc-33fc1c56)

  SecurityGroupId:
    Type: String
    Default: sg-c4d324a1
    Description: Security Group ID for Image Builder instance (SSM / NAT必須)

Resources:
  ImageRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: HandsOn-Linux-Update-Recipe
      Version: 1.0.0
      ParentImage: ami-02174d3d96bb952f7
      Components:
        - ComponentArn: arn:aws:imagebuilder:ap-northeast-1:aws:component/update-linux/x.x.x
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 50
            DeleteOnTermination: true
            VolumeType: gp3

  InfrastructureConfig:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: HandsOn-Linux-Infrastructure
      InstanceTypes:
        - t3.small
      TerminateInstanceOnFailure: true
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      InstanceProfileName: !Ref EC2InstanceProfileForImageBuilder

  EC2InstanceRoleForImageBuilder:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GetComponentForImageBuilder
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - imagebuilder:GetComponent
                Resource: "*"

  EC2InstanceProfileForImageBuilder:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRoleForImageBuilder

  DistributionConfig:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: HandsOn-Linux-Distribution
      Distributions:
        - Region: ap-northeast-1
          AmiDistributionConfiguration:
            Name: HandsOnBase-Lin-{{imagebuilder:buildDate}}
            AmiTags:
              Name: Update-at-{{imagebuilder:buildDate}}

  ImagePipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: HandsOn-Linux-Pipeline
      ImageRecipeArn: !Ref ImageRecipe
      InfrastructureConfigurationArn: !Ref InfrastructureConfig
      DistributionConfigurationArn: !Ref DistributionConfig
      Schedule:
        ScheduleExpression: cron(0 15 31 12,6 ? *) # 12/31と6/30の15:00 UTC = 1/1と7/1の00:00 JST
        PipelineExecutionStartCondition: EXPRESSION_MATCH_ONLY
      Status: ENABLED

Outputs:
  PipelineName:
    Description: Name of the Image Builder Pipeline
    Value: !Ref ImagePipeline
  RecipeName:
    Description: Name of the Recipe
    Value: !Ref ImageRecipe
